# Points at the JOB benchmark database generated by the gem's
# `rake benchmark:setup` task. Override the location with JOB_DB.
default: &default
  adapter: sqlite3
  pool: 5
  timeout: 5000

development:
  <<: *default
  database: <%= ENV.fetch("JOB_DB") { Rails.root.join("..", "benchmark", "fixtures", "job.sqlite").to_s } %>

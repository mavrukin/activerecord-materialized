# Local hooks are scoped to changed files for speed. Full validation runs in CI
# (.github/workflows/ci.yml): all RuboCop, full RSpec, benchmark integration.
pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "{lib/**/*.rb,bin/**,**/*.{rb,rake}}"
      run: bundle exec rubocop --force-exclusion {staged_files}
    rspec:
      glob: "{lib/**/*.rb,spec/**/*_spec.rb,spec/spec_helper.rb,spec/support/**}"
      run: bin/hook-rspec {staged_files}

pre-push:
  commands:
    rubocop:
      glob: "{lib/**/*.rb,bin/**}"
      run: bundle exec rubocop lib/ bin/ --parallel
    rspec:
      glob: "{lib/**/*.rb,spec/**/*_spec.rb,spec/spec_helper.rb,spec/support/**}"
      run: bin/hook-rspec {push_files}

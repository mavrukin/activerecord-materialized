pre-commit:
  parallel: true
  commands:
    strict-sigils:
      glob: "lib/**/*.rb"
      run: bin/check-strict-sigils {staged_files}
    rubocop:
      glob: "*.{rb,rake}"
      exclude: "sorbet/**/*"
      run: bundle exec rubocop --force-exclusion {staged_files}
    sorbet:
      run: bundle exec srb tc
    rspec:
      run: bundle exec rspec --exclude-pattern "spec/integration/benchmark_update_verification_spec.rb"

pre-push:
  commands:
    full-test-suite:
      run: bundle exec rspec

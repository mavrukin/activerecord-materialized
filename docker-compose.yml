# Local real-database matrix for the integration suite (#70).
#
#   bundle config set --local with integration && bundle install
#   bundle exec rake integration:up      # start MySQL + Postgres
#   bundle exec rake integration         # run the matrix (SQLite in-process too)
#   bundle exec rake integration:down    # stop and remove
#
# Server-level CDC flags are set (ROW binlog / logical WAL) to match CI and ready
# the real-capture follow-up; no replication slots/publications are created here
# (the suite is capture-shaped — see docs/integration-testing.md).
services:
  mysql:
    # Pinned to 8.0: 8.4 removed --default-authentication-plugin and defaults to
    # caching_sha2_password, which fails over trilogy's non-TLS TCP on first auth.
    image: mysql:8.0
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--log-bin=binlog"
      - "--binlog-format=ROW"
      - "--binlog-row-image=FULL"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: arm_test
    # Host port 3307 (not 3306) so a developer's local MySQL doesn't shadow the
    # container. Match with ARM_MYSQL_PORT=3307 — see docs/integration-testing.md.
    ports: ["3307:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arm_test
    # Host port 5433 (not 5432) so a developer's local Postgres doesn't shadow it.
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
